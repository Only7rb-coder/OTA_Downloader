name: Extract needrom Firmware

on:
  workflow_dispatch:
    inputs:
      ota_url:
        description: 'Direct Download URL for the Firmware zip'
        required: true
      cookies:
        description: 'Paste your browser cookie string here (Handle with care!)'
        required: true
        type: string

jobs:
  extract-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip jq curl file

      - name: Process Firmware
        run: |
          mkdir -p workspace/extracted_images
          cd workspace
          
          # Use the cookie string provided in the input field
          COOKIE_VAL="${{ github.event.inputs.cookies }}"
          
          echo "Downloading with authenticated curl..."
          curl -L "${{ github.event.inputs.ota_url }}" \
            -H "accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8" \
            -H "accept-language: en-US,en;q=0.9" \
            -H "cache-control: max-age=0" \
            -b "$COOKIE_VAL" \
            -H "referer: https://www.needrom.com/" \
            -H "user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.0.0 Safari/147.0.0.0" \
            -o ota_package.zip

          # Validation Step
          echo "Checking if file is a valid ZIP..."
          if ! file ota_package.zip | grep -q "Zip archive"; then
            echo "::error:: Download failed. The session likely expired or the IP address was rejected."
            echo "--- File Preview (Error Page) ---"
            head -n 10 ota_package.zip
            exit 1
          fi
          
          echo "Unzipping..."
          unzip -o ota_package.zip
          
          echo "Searching for images..."
          find . -type f \( -name "boot.img" -o -name "init_boot.img" -o -name "vbmeta.img" \) -exec cp {} extracted_images/ \;
          
          if [ -z "$(ls -A extracted_images)" ]; then
            echo "Error: Required images not found."
            exit 1
          fi

      - name: Zip and Upload
        run: |
          zip -j output_package.zip workspace/extracted_images/*.img
          SERVER_RESPONSE=$(curl -s https://api.gofile.io/servers)
          SERVER=$(echo $SERVER_RESPONSE | jq -r '.data.servers[0].name')
          
          echo "Uploading package to: $SERVER"
          UPLOAD_RESPONSE=$(curl -s -F file=@output_package.zip "https://$SERVER.gofile.io/contents/uploadFile")
          DOWNLOAD_LINK=$(echo $UPLOAD_RESPONSE | jq -r '.data.downloadPage')
          
          echo "✅ Success: output_package.zip uploaded."
          echo "Link: $DOWNLOAD_LINK"
