name: Auto ROM Processor
on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Needrom Username'
        required: true
        type: string
      password:
        description: 'Needrom Password'
        required: true
        type: string
      page_url:
        description: 'Needrom ROM Page URL'
        required: true
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Install Dependencies
        run: pip install cloudscraper beautifulsoup4 requests

      - name: Process ROM
        env:
          NEEDROM_USER: ${{ inputs.username }}
          NEEDROM_PASS: ${{ inputs.password }}
          ROM_PAGE_URL: ${{ inputs.page_url }}
        run: |
          python3 -c "
          import os, sys, cloudscraper, zipfile, io, time
          from bs4 import BeautifulSoup
          import requests
          
          # Initialize CloudScraper to bypass WAF/Cloudflare
          scraper = cloudscraper.create_scraper()
          
          # 1. GET login page to retrieve the nonce
          print('Fetching login page to retrieve security token...')
          login_page = scraper.get('https://www.needrom.com/wp-login.php')
          soup = BeautifulSoup(login_page.text, 'html.parser')
          
          nonce_input = soup.find('input', {'name': '_wpnonce'})
          if not nonce_input:
              print('Error: Could not find security token (_wpnonce).')
              sys.exit(1)
          
          wp_nonce = nonce_input['value']
          
          # 2. Login
          print('Logging into Needrom...')
          login_data = {
              'log': os.getenv('NEEDROM_USER'), 
              'pwd': os.getenv('NEEDROM_PASS'), 
              'wp-submit': 'Log In', 
              'redirect_to': 'https://www.needrom.com/',
              '_wpnonce': wp_nonce,
              '_wp_http_referer': '/wp-login.php',
              'rememberme': 'forever'
          }
          resp = scraper.post('https://www.needrom.com/wp-login.php', data=login_data)
          
          # 3. Fetch ROM Page
          print(f'Fetching: {os.getenv('ROM_PAGE_URL')}')
          page = scraper.get(os.getenv('ROM_PAGE_URL'))
          soup = BeautifulSoup(page.text, 'html.parser')
          
          # 4. Find download link
          download_link = None
          for a in soup.find_all('a', href=True):
              if 'download' in a['href'] or 'dl.php' in a['href']:
                  download_link = a['href']
                  break
          
          if not download_link:
              print('Error: Could not find download link.')
              sys.exit(1)
              
          print(f'Downloading from: {download_link}')
          # Use stream=True to handle large files
          r = scraper.get(download_link, stream=True)
          
          # 5. Extract specific files
          target_files = ['init_boot', 'boot', 'vbmeta']
          extracted_files = []
          
          with zipfile.ZipFile(io.BytesIO(r.content)) as zip_ref:
              for file in zip_ref.namelist():
                  if any(x in file.lower() for x in target_files):
                      zip_ref.extract(file)
                      extracted_files.append(file)
                      print(f'Extracted: {file}')
          
          # 6. Upload to Gofile
          print('Uploading to Gofile...')
          upload_url = 'https://api.gofile.io/uploadFile'
          
          for f in extracted_files:
              if os.path.exists(f):
                  with open(f, 'rb') as file_obj:
                      files = {'filesUploaded': (f, file_obj)}
                      upload_resp = requests.post(upload_url, files=files)
                      
                      try:
                          result = upload_resp.json()
                          if result.get('status') == 'ok':
                              print(f\"Uploaded {f}: {result['data']['downloadPage']}\")
                          else:
                              print(f\"Upload failed for {f}: {result}\")
                      except Exception as e:
                          print(f\"Failed to parse Gofile response: {e}\")
          "
